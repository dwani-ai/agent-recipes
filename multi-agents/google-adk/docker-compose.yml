services:
  adk-web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      LITELLM_MODEL_NAME: ${LITELLM_MODEL_NAME}
      LITELLM_API_BASE: ${LITELLM_API_BASE}
      LITELLM_API_KEY: ${LITELLM_API_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
