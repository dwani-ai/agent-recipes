services:
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    restart: unless-stopped
    ports:
      - "80:8080"
    volumes:
      - ./models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      --model /models/sarvam-30b-Q4_K_M.gguf-00001-of-00006.gguf
      --ctx-size 4096
      --n-gpu-layers 99
      --host 0.0.0.0
      --port 8080
      --jinja
      --alias gemma3
      --reasoning-budget 0
      --chat-template-kwargs "{\"enable_thinking\": false}"

  adk-web:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "8000"
    environment:
      LITELLM_MODEL_NAME: ${LITELLM_MODEL_NAME}
      LITELLM_API_BASE: ${LITELLM_API_BASE}
      LITELLM_API_KEY: ${LITELLM_API_KEY}
    depends_on:
      - llama-server
    restart: unless-stopped

  # ADK UI behind nginx (port 8081) — llama HTTP API stays on host port 80.
  proxy:
    build:
      context: ./deploy/nginx
      dockerfile: Dockerfile
    ports:
      - "8081:80"
    depends_on:
      - adk-web
    environment:
      BASIC_AUTH_USER: ${BASIC_AUTH_USER:-adk}
      BASIC_AUTH_PASSWORD: ${BASIC_AUTH_PASSWORD}
      ALLOW_UNAUTHENTICATED_ACCESS: ${ALLOW_UNAUTHENTICATED_ACCESS:-}
    restart: unless-stopped
