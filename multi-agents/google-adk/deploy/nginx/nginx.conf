# Reverse proxy for ADK Web — bind only nginx to port 80; ADK stays internal.
# Auth snippet is generated by deploy/nginx/docker-entrypoint.d/40-adk-auth.sh

worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    server_tokens off;

    # Mitigate slowloris / abusive clients (tune on the VM firewall too).
    limit_req_zone $binary_remote_addr zone=adk_req:10m rate=20r/s;
    limit_conn_zone $binary_remote_addr zone=adk_conn:10m;

    # Large prompts / recordings (adjust if needed)
    client_max_body_size 50m;
    client_body_timeout 60s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream adk_web {
        server adk-web:8000;
        keepalive 32;
    }

    server {
        listen 80;
        listen [::]:80;

        # Security headers (TLS termination should be in front for production HTTPS)
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        location / {
            limit_req zone=adk_req burst=40 nodelay;
            limit_conn adk_conn 20;

            include /etc/nginx/adk-auth.conf;

            proxy_pass http://adk_web;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
        }
    }
}
